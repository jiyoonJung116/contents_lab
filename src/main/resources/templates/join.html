<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowInsta 회원가입</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/join.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-6xl bg-white rounded-3xl shadow-xl flex flex-col md:flex-row overflow-hidden">
        
        <div class="hidden md:flex md:w-1/2 bg-[#F5F7FF] p-12 flex-col justify-between">
            <div>
                <div class="flex items-center gap-2 mb-8">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">G</div>
                    <span class="text-2xl font-bold">GrowInsta</span>
                </div>
                <h2 class="text-4xl font-bold leading-tight mb-6">AI와 함께<br><span class="text-indigo-600">인스타 성장</span>을<br>더 빠르게.</h2>
                <p class="text-gray-500 mb-8">콘텐츠 아이디어부터 성장 전략까지,<br>모든 것을 한 곳에서!</p>
                <div class="space-y-4">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border w-64 flex items-center gap-4">
                        <div class="w-10 h-10 bg-yellow-100 rounded-lg flex items-center justify-center text-yellow-500">💡</div>
                        <div><p class="font-bold text-sm">콘텐츠 아이디어</p></div>
                    </div>
                </div>
            </div>
            
            <div class="mt-auto">
                <p class="text-sm font-semibold mb-3">수많은 크리에이터들이 GrowInsta와 함께 성장하고 있어요.</p>
                <div class="flex items-center gap-4">
                    <div class="flex -space-x-3">
                        <div class="w-10 h-10 rounded-full bg-gray-300 border-2 border-white"></div>
                        <div class="w-10 h-10 rounded-full bg-gray-400 border-2 border-white"></div>
                        <div class="w-10 h-10 rounded-full bg-gray-500 border-2 border-white"></div>
                        <div class="w-10 h-10 rounded-full bg-indigo-600 border-2 border-white flex items-center justify-center text-white text-xs">+10K</div>
                    </div>
                    <div class="text-sm">
                        <span class="text-yellow-400">★★★★★</span> <span class="font-bold">4.9/5</span> (사용자 평점)
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full md:w-1/2 p-8 md:p-16 overflow-y-auto">
            <h1 class="text-3xl font-bold mb-2">회원가입</h1>
            <p class="text-gray-500 mb-8">계정을 생성하고 모든 기능을 이용해보세요.</p>

            <form id="joinForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">이메일</label>
                    <input type="email" name="email" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-600" placeholder="이메일 주소를 입력하세요">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">비밀번호</label>
                    <input type="password" name="password" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-600" placeholder="비밀번호를 입력하세요">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">비밀번호 확인</label>
                    <input type="password" name="confirmPassword" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-600" placeholder="비밀번호를 다시 입력하세요">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">이름</label>
                    <input type="text" name="userName" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-600" placeholder="이름을 입력하세요">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">사용자명</label>
                    <div class="flex items-center border rounded-xl p-3 focus-within:ring-2 focus-within:ring-indigo-600">
                        <span class="text-gray-400 mr-2">@</span>
                        <input type="text" name="nickname" class="w-full outline-none" placeholder="사용자명을 입력하세요">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">관심 있는 콘텐츠 (선택)</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button type="button" class="border py-2 px-2 rounded-lg text-xs hover:border-indigo-600">콘텐츠 아이디어</button>
                        <button type="button" class="border py-2 px-2 rounded-lg text-xs hover:border-indigo-600">성장 전략</button>
                        <button type="button" class="border py-2 px-2 rounded-lg text-xs hover:border-indigo-600">트렌드</button>
                    </div>
                </div>

                <div class="flex items-center gap-2 text-sm pt-2">
                    <input type="checkbox" id="terms" class="w-4 h-4 accent-indigo-600">
                    <label for="terms" class="text-gray-600">이용약관, 개인정보처리방침에 동의합니다.</label>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition">회원가입</button>
            </form>

            <div class="my-6 text-center text-sm text-gray-400">또는</div>

            <div class="space-y-3">
                <button class="w-full border py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50">Google로 가입하기</button>
                <button class="w-full border py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50">Apple로 가입하기</button>
            </div>

            <p class="text-center text-sm text-gray-500 mt-8">이미 계정이 있으신가요? <a href="#" class="text-indigo-600 font-bold">로그인</a></p>
        </div>
    </div>

<script>
    document.getElementById('joinForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const formData = new FormData(this);

        fetch('/api/user/join', {
            method: 'POST',
            body: formData 
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'error') {
                alert('실패: ' + data.message); 
            } else {
                alert('회원가입 성공!');
                window.location.href = '/user/login'; 
            }
        })
        .catch(error => {
            alert('서버 통신 중 오류가 발생했습니다.');
        });
    });
</script>

</body>
</html>
